<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BJN - Buscador de Sentencias</title>
<style>
  :root {
    --azul: #1a3a5c;
    --azul-claro: #2563a8;
    --gris: #f4f5f7;
    --borde: #d0d7e2;
    --texto: #1c2733;
    --extracto: #4a5568;
    --rojo: #c0392b;
    --verde: #166534;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', Arial, sans-serif;
    font-size: 14px;
    color: var(--texto);
    background: var(--gris);
    min-height: 100vh;
  }

  header {
    background: var(--azul);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  header h1 { font-size: 18px; font-weight: 600; letter-spacing: 0.3px; }
  header span { font-size: 12px; opacity: 0.7; }

  .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

  /* Formulario de búsqueda */
  .search-panel {
    background: white;
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 18px 20px;
  }

  .search-main {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  .search-main .field { flex: 1; }

  .filters-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px 16px;
    margin-top: 12px;
  }

  .field { display: flex; flex-direction: column; gap: 4px; }

  label {
    font-size: 11px;
    font-weight: 600;
    color: var(--azul);
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  input[type="text"], select {
    border: 1px solid var(--borde);
    border-radius: 4px;
    padding: 8px 10px;
    font-size: 14px;
    font-family: inherit;
    color: var(--texto);
    background: white;
    width: 100%;
    transition: border-color 0.15s;
  }
  input:focus, select:focus {
    outline: none;
    border-color: var(--azul-claro);
    box-shadow: 0 0 0 2px rgba(37,99,168,0.12);
  }

  .btn {
    padding: 8px 22px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .btn:hover { opacity: 0.87; }
  .btn-primary { background: var(--azul-claro); color: white; }
  .btn-secondary { background: #e2e8f0; color: var(--texto); }

  /* Historial */
  .history-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 10px;
    min-height: 0;
  }
  .history-label {
    font-size: 11px;
    color: var(--extracto);
    align-self: center;
    white-space: nowrap;
  }
  .history-chip {
    font-size: 11px;
    padding: 3px 9px;
    background: #eef2fb;
    border: 1px solid var(--borde);
    border-radius: 12px;
    cursor: pointer;
    color: var(--azul);
    white-space: nowrap;
    max-width: 220px;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: background 0.12s;
  }
  .history-chip:hover { background: #dde8f8; }
  .history-chip-del { margin-left: 4px; opacity: 0.5; font-size: 10px; }

  /* Results */
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin: 18px 0 10px;
    font-size: 13px;
    color: var(--extracto);
    gap: 10px;
    flex-wrap: wrap;
  }
  .results-count strong { color: var(--texto); }
  .results-actions { display: flex; gap: 8px; align-items: center; }

  .result-list { display: flex; flex-direction: column; gap: 8px; }

  .result-card {
    background: white;
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 12px 16px;
    cursor: pointer;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .result-card:hover { border-color: var(--azul-claro); box-shadow: 0 2px 6px rgba(0,0,0,0.07); }
  .result-card.selected { border-color: var(--azul-claro); background: #f0f5ff; }

  .result-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 5px;
  }
  .badge {
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-numero { background: var(--azul); color: white; }
  .badge-tipo { background: #e8f0fb; color: var(--azul); }
  .badge-tribunal { background: #f0fdf4; color: var(--verde); border: 1px solid #bbf7d0; }
  .badge-definitiva { background: #1a3a5c; color: white; }
  .badge-interlocutoria { background: #7c3aed; color: white; }

  .result-proceso { font-size: 12px; color: var(--extracto); margin-bottom: 5px; }
  .result-extracto { font-size: 13px; color: var(--extracto); line-height: 1.55; }
  .result-extracto mark { background: #fef9c3; padding: 0 1px; border-radius: 2px; }

  /* Paginacion */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-top: 16px;
    padding: 10px 0;
  }
  .page-btn {
    padding: 6px 18px;
    border: 1px solid var(--borde);
    border-radius: 4px;
    background: white;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--azul-claro);
    transition: background 0.15s, border-color 0.15s;
  }
  .page-btn:hover:not(:disabled) { background: #e8f0fb; border-color: var(--azul-claro); }
  .page-btn:disabled { opacity: 0.35; cursor: default; }
  .page-info { font-size: 12px; color: var(--extracto); min-width: 80px; text-align: center; }

  /* Detail panel */
  .detail-panel {
    background: white;
    border: 1px solid var(--borde);
    border-radius: 6px;
    padding: 20px;
    margin-top: 16px;
    display: none;
  }
  .detail-panel.active { display: block; }

  .detail-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 14px;
    gap: 12px;
  }
  .detail-title { font-size: 15px; font-weight: 700; color: var(--azul); line-height: 1.4; }

  .detail-body {
    white-space: pre-wrap;
    line-height: 1.8;
    font-size: 13.5px;
    color: var(--texto);
    border-top: 1px solid var(--borde);
    padding-top: 14px;
    max-height: 70vh;
    overflow-y: auto;
    font-family: 'Georgia', serif;
  }
  .detail-body mark { background: #fef9c3; padding: 0 2px; border-radius: 2px; }

  .detail-actions {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .btn-icon {
    padding: 5px 12px;
    font-size: 12px;
    border: 1px solid var(--borde);
    border-radius: 4px;
    background: white;
    cursor: pointer;
    color: var(--texto);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    transition: background 0.15s;
    white-space: nowrap;
  }
  .btn-icon:hover { background: #f0f5ff; border-color: var(--azul-claro); }
  .detail-meta { font-size: 11px; color: var(--extracto); margin-top: 4px; }

  /* Status */
  .status {
    padding: 12px 16px;
    border-radius: 6px;
    font-size: 13px;
    margin-top: 14px;
    display: none;
  }
  .status.loading { background: #eff6ff; color: var(--azul); border: 1px solid #bfdbfe; display: block; }
  .status.error   { background: #fef2f2; color: var(--rojo); border: 1px solid #fca5a5; display: block; }

  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #bfdbfe;
    border-top-color: var(--azul-claro);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .timer { font-size: 11px; opacity: 0.7; margin-left: 8px; }

  /* Compartir toast */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: #1a3a5c;
    color: white;
    padding: 10px 20px;
    border-radius: 6px;
    font-size: 13px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .bjn-link {
    font-size: 12px;
    color: rgba(255,255,255,0.75);
    text-decoration: none;
    border-bottom: 1px dotted rgba(255,255,255,0.4);
    margin-left: auto;
  }
  .bjn-link:hover { color: white; }

  @media (max-width: 640px) {
    .filters-row { grid-template-columns: 1fr 1fr; }
    .search-main { flex-wrap: wrap; }
    .search-main .btn { width: 100%; }
    .detail-actions { flex-direction: column; align-items: flex-start; }
  }
  @media (max-width: 400px) {
    .filters-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>BJN - Base de Jurisprudencia Nacional</h1>
    <span>Poder Judicial de la Rep. Oriental del Uruguay</span>
  </div>
  <a class="bjn-link" href="https://bjn.poderjudicial.gub.uy/" target="_blank">Abrir BJN original</a>
</header>

<div class="container">

  <!-- Formulario de búsqueda -->
  <div class="search-panel">

    <!-- Fila principal: texto + botón -->
    <div class="search-main">
      <div class="field">
        <label>Texto a buscar</label>
        <input type="text" id="s-texto"
               placeholder="ej: despido abusivo, accidente laboral, responsabilidad estatal..."
               onkeydown="if(event.key==='Enter') buscar()">
      </div>
      <button class="btn btn-primary" onclick="buscar()" style="padding:8px 28px; align-self:flex-end;">Buscar</button>
    </div>

    <!-- Fila de filtros -->
    <div class="filters-row">
      <div class="field">
        <label>Tipo de búsqueda</label>
        <select id="s-tipo">
          <option value="TODAS_LAS_PALABRAS">Todas las palabras</option>
          <option value="FRASE_EXACTA">Frase exacta</option>
          <option value="ALGUNA_PALABRA">Alguna de las palabras</option>
          <option value="MAXIMIZAR_RESULTADOS">Maximizar resultados</option>
        </select>
      </div>
      <div class="field">
        <label>Tipo de sentencia</label>
        <select id="s-tipo-sentencia">
          <option value="">Todas</option>
          <option value="definitiva">Definitiva</option>
          <option value="interlocutoria">Interlocutoria</option>
        </select>
      </div>
      <div class="field">
        <label>Ordenar por</label>
        <select id="s-ordenar">
          <option value="RELEVANCIA">Relevancia</option>
          <option value="FECHA_DESCENDENTE">Fecha (más reciente)</option>
          <option value="FECHA_ASCENDENTE">Fecha (más antigua)</option>
        </select>
      </div>
    </div>

    <!-- Historial -->
    <div id="history-simple" class="history-bar"></div>
  </div>

  <!-- Status con timer -->
  <div id="status" class="status"></div>

  <!-- Resultados -->
  <div id="results-area" style="display:none;">
    <div class="results-header">
      <div class="results-count" id="results-count"></div>
      <div class="results-actions">
        <button class="btn-icon" onclick="compartirBusqueda()" title="Copiar enlace a esta búsqueda">&#128279; Compartir</button>
      </div>
    </div>
    <div class="result-list" id="result-list"></div>

    <!-- Paginacion -->
    <div class="pagination" id="pagination" style="display:none;">
      <button class="page-btn" id="btn-prev" onclick="cambiarPagina('prev')" disabled>&#8592; Anterior</button>
      <span class="page-info" id="page-info"></span>
      <button class="page-btn" id="btn-next" onclick="cambiarPagina('next')" disabled>Siguiente &#8594;</button>
    </div>
  </div>

  <!-- Detalle de sentencia -->
  <div id="detail-panel" class="detail-panel">
    <div class="detail-header">
      <div>
        <div class="detail-title" id="detail-title"></div>
        <div class="detail-meta" id="detail-meta"></div>
      </div>
      <div class="detail-actions">
        <button class="btn-icon" onclick="copiarTexto()" title="Copiar texto completo">&#128203; Copiar</button>
        <button class="btn-icon" onclick="exportarTxt()" title="Descargar como archivo de texto">&#128190; Exportar .txt</button>
        <button class="btn-icon" onclick="cerrarDetalle()">&#x2715; Cerrar</button>
      </div>
    </div>
    <div class="detail-body" id="detail-body"></div>
  </div>

</div>

<!-- Toast de compartir -->
<div class="toast" id="toast"></div>

<script>
let ultimaBusqueda = null;
let sessionId      = null;
let paginacionActual = { hasNext: false, hasPrev: false, pageText: '' };
let timerInterval  = null;
let timerStart     = 0;

// ─── Status con timer ──────────────────────────────────────────────────────

function setStatus(msg, tipo) {
  const el = document.getElementById('status');
  clearInterval(timerInterval);
  timerInterval = null;

  if (!tipo) {
    el.className = 'status';
    el.style.display = 'none';
    return;
  }

  el.className = 'status ' + tipo;

  if (tipo === 'loading') {
    timerStart = Date.now();
    const render = () => {
      const seg = ((Date.now() - timerStart) / 1000).toFixed(0);
      el.innerHTML = `<span class="spinner"></span>${msg}<span class="timer">(${seg}s)</span>`;
    };
    render();
    timerInterval = setInterval(render, 1000);
  } else {
    el.innerHTML = msg;
  }
}

// ─── Toast ─────────────────────────────────────────────────────────────────

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ─── Historial (localStorage) ──────────────────────────────────────────────

const HIST_KEY = 'bjn_hist_simple_v2';
const HIST_MAX = 10;

function histLoad() {
  try { return JSON.parse(localStorage.getItem(HIST_KEY) || '[]'); }
  catch { return []; }
}

function histSave(items) {
  localStorage.setItem(HIST_KEY, JSON.stringify(items));
}

function histAdd(payload) {
  const texto = (payload.texto || '').trim();
  if (!texto) return;
  const items = histLoad().filter(i => i.texto !== texto);
  items.unshift({
    texto,
    tipo:         payload.tipoBusqueda,
    tipoSentencia: payload.tipoSentencia || '',
    ordenar:      payload.ordenar,
    ts:           Date.now()
  });
  histSave(items.slice(0, HIST_MAX));
  renderHistory();
}

function renderHistory() {
  const items     = histLoad();
  const container = document.getElementById('history-simple');
  if (!items.length) { container.innerHTML = ''; return; }

  let html = '<span class="history-label">Recientes:</span>';
  items.forEach((item, idx) => {
    const safe = item.texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    html += `<span class="history-chip" onclick="histApply(${idx})" title="${safe}">`
          + safe.substring(0, 35) + (safe.length > 35 ? '...' : '')
          + `<span class="history-chip-del" onclick="event.stopPropagation();histRemove(${idx})">&#x2715;</span>`
          + '</span>';
  });
  container.innerHTML = html;
}

function histApply(idx) {
  const item = histLoad()[idx];
  if (!item) return;
  document.getElementById('s-texto').value          = item.texto || '';
  document.getElementById('s-tipo').value           = item.tipo  || 'TODAS_LAS_PALABRAS';
  document.getElementById('s-tipo-sentencia').value = item.tipoSentencia || '';
  document.getElementById('s-ordenar').value        = item.ordenar || 'RELEVANCIA';
  buscar();
}

function histRemove(idx) {
  const items = histLoad();
  items.splice(idx, 1);
  histSave(items);
  renderHistory();
}

renderHistory();

// ─── URL params (compartir búsqueda) ──────────────────────────────────────

function buildPayload() {
  return {
    modo:          'simple',
    texto:         document.getElementById('s-texto').value.trim(),
    tipoBusqueda:  document.getElementById('s-tipo').value,
    tipoSentencia: document.getElementById('s-tipo-sentencia').value,
    ordenar:       document.getElementById('s-ordenar').value,
  };
}

function payloadToParams(p) {
  const params = new URLSearchParams();
  if (p.texto)         params.set('q', p.texto);
  if (p.tipoBusqueda && p.tipoBusqueda !== 'TODAS_LAS_PALABRAS') params.set('t', p.tipoBusqueda);
  if (p.tipoSentencia) params.set('ts', p.tipoSentencia);
  if (p.ordenar && p.ordenar !== 'RELEVANCIA') params.set('o', p.ordenar);
  return params;
}

function loadFromParams() {
  const params = new URLSearchParams(window.location.search);
  if (!params.get('q')) return;
  document.getElementById('s-texto').value          = params.get('q') || '';
  document.getElementById('s-tipo').value           = params.get('t') || 'TODAS_LAS_PALABRAS';
  document.getElementById('s-tipo-sentencia').value = params.get('ts') || '';
  document.getElementById('s-ordenar').value        = params.get('o') || 'RELEVANCIA';
  buscar();
}

function compartirBusqueda() {
  if (!ultimaBusqueda) return;
  const params = payloadToParams(ultimaBusqueda);
  const url    = `${window.location.origin}${window.location.pathname}?${params.toString()}`;
  navigator.clipboard.writeText(url)
    .then(() => showToast('Enlace copiado al portapapeles'))
    .catch(() => {
      prompt('Copiá este enlace:', url);
    });
}

// ─── Búsqueda ──────────────────────────────────────────────────────────────

async function buscar() {
  const payload = buildPayload();
  if (!payload.texto) {
    setStatus('Ingresá un texto para buscar.', 'error');
    return;
  }
  ultimaBusqueda = payload;

  // Actualizar URL sin recargar la página
  const params = payloadToParams(payload);
  history.replaceState(null, '', `?${params.toString()}`);

  setStatus('Consultando el BJN...', 'loading');
  document.getElementById('results-area').style.display = 'none';
  cerrarDetalle();

  for (let intento = 1; intento <= 2; intento++) {
    if (intento > 1) {
      setStatus('El servidor estaba ocupado. Reintentando...', 'loading');
      await new Promise(res => setTimeout(res, 3000));
    }
    try {
      const r    = await fetch('/api/buscar', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      const text = await r.text();
      if (!text || !text.trim()) {
        if (intento < 2) continue;
        setStatus('El servidor tardó demasiado. Intentá de nuevo en unos segundos.', 'error');
        return;
      }
      let data;
      try { data = JSON.parse(text); }
      catch {
        if (intento < 2) continue;
        setStatus('El servidor tardó demasiado. Intentá de nuevo en unos segundos.', 'error');
        return;
      }
      if (!r.ok) throw new Error(data.error || 'Error desconocido');
      sessionId = data.sid || null;
      histAdd(payload);
      setStatus('', '');
      renderResults(data);
      return;
    } catch (e) {
      if (intento < 2 && e.message.includes('JSON')) continue;
      setStatus('Error: ' + e.message, 'error');
      return;
    }
  }
}

// ─── Paginación ────────────────────────────────────────────────────────────

async function cambiarPagina(direction) {
  if (!sessionId) return;
  setStatus('Cargando página...', 'loading');
  document.getElementById('result-list').innerHTML = '';

  try {
    const r    = await fetch('/api/pagina', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ sid: sessionId, direction }),
    });
    const text = await r.text();
    if (!text || !text.trim()) {
      setStatus('El servidor tardó demasiado. Intentá de nuevo.', 'error');
      return;
    }
    const data = JSON.parse(text);
    if (!r.ok) throw new Error(data.error || 'Error');
    setStatus('', '');
    renderResults(data);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } catch (e) {
    setStatus('Error: ' + e.message, 'error');
  }
}

function renderPagination(pagination) {
  const bar      = document.getElementById('pagination');
  const btnPrev  = document.getElementById('btn-prev');
  const btnNext  = document.getElementById('btn-next');
  const pageInfo = document.getElementById('page-info');

  paginacionActual = pagination || { hasNext: false, hasPrev: false, pageText: '' };

  if (!paginacionActual.hasNext && !paginacionActual.hasPrev) {
    bar.style.display = 'none';
    return;
  }

  bar.style.display = 'flex';
  btnPrev.disabled  = !paginacionActual.hasPrev;
  btnNext.disabled  = !paginacionActual.hasNext;
  pageInfo.textContent = paginacionActual.pageText || '';
}

// ─── Resaltado de términos ─────────────────────────────────────────────────

function highlight(text, query) {
  if (!query || !text) return escapeHtml(text || '');
  // Escapar HTML primero
  let result = escapeHtml(text);
  // Resaltar cada palabra de más de 2 caracteres
  const words = query.trim().split(/\s+/).filter(w => w.length > 2);
  words.forEach(w => {
    const escaped = w.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    const re = new RegExp(`(${escaped})`, 'gi');
    result = result.replace(re, '<mark>$1</mark>');
  });
  return result;
}

function escapeHtml(str) {
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

// ─── Filtro cliente por tipo de sentencia ─────────────────────────────────

function matchTipoSentencia(r, filtro) {
  if (!filtro) return true;
  const tipo = (r.tipo || '').toLowerCase();
  const num  = (r.numero || '').toLowerCase();
  const proc = (r.proceso || '').toLowerCase();
  const combined = tipo + ' ' + num + ' ' + proc;
  if (filtro === 'definitiva')     return combined.includes('definitiv') || combined.includes('def.');
  if (filtro === 'interlocutoria') return combined.includes('interlocut') || combined.includes('int.');
  return true;
}

// ─── Render resultados ─────────────────────────────────────────────────────

function renderResults(data) {
  const area  = document.getElementById('results-area');
  const list  = document.getElementById('result-list');
  const count = document.getElementById('results-count');

  const filtroTipo = ultimaBusqueda?.tipoSentencia || '';
  const resultados = filtroTipo
    ? data.results.filter(r => matchTipoSentencia(r, filtroTipo))
    : data.results;

  const total = resultados.length;
  const totalOriginal = data.results.length;

  let countHtml = `<strong>${total}</strong> resultado${total !== 1 ? 's' : ''} encontrado${total !== 1 ? 's' : ''}`;
  if (filtroTipo && totalOriginal !== total) {
    countHtml += ` <span style="color:#6b7280; font-size:12px;">(${totalOriginal} sin filtro de tipo)</span>`;
  }
  count.innerHTML = countHtml;
  list.innerHTML  = '';

  if (total === 0) {
    list.innerHTML = '<div style="padding:20px; color:#666; text-align:center;">Sin resultados para los criterios ingresados.</div>';
  } else {
    resultados.forEach((r, i) => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.onclick   = () => cargarDetalle(data.results.indexOf(r), card);

      // Badge de tipo de sentencia con color diferenciado
      let tipoBadge = '';
      if (r.tipo) {
        const tipoLower = r.tipo.toLowerCase();
        const cls = tipoLower.includes('definitiv') ? 'badge-definitiva'
                  : tipoLower.includes('interlocut') ? 'badge-interlocutoria'
                  : 'badge-tipo';
        tipoBadge = `<span class="badge ${cls}">${escapeHtml(r.tipo)}</span>`;
      }

      card.innerHTML = `
        <div class="result-meta">
          ${r.numero   ? `<span class="badge badge-numero">${escapeHtml(r.numero)}</span>` : ''}
          ${tipoBadge}
          ${r.tribunal ? `<span class="badge badge-tribunal">${escapeHtml(r.tribunal)}</span>` : ''}
        </div>
        ${r.proceso ? `<div class="result-proceso">${escapeHtml(r.proceso)}</div>` : ''}
        <div class="result-extracto">${highlight(r.extracto || '', ultimaBusqueda?.texto)}</div>
      `;
      list.appendChild(card);
    });
  }

  area.style.display = 'block';
  renderPagination(data.pagination);
}

// ─── Detalle ───────────────────────────────────────────────────────────────

async function cargarDetalle(index, cardEl) {
  document.querySelectorAll('.result-card').forEach(c => c.classList.remove('selected'));
  if (cardEl) cardEl.classList.add('selected');

  const payload = { ...ultimaBusqueda, index, sid: sessionId };

  setStatus('Cargando texto de la sentencia...', 'loading');
  cerrarDetalle();

  try {
    const r    = await fetch('/api/detalle', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(payload),
    });
    const text = await r.text();
    if (!text || !text.trim()) throw new Error('El servidor tardó demasiado. Intentá de nuevo.');
    const data = JSON.parse(text);
    if (!r.ok) throw new Error(data.error || 'Error');

    setStatus('', '');

    document.getElementById('detail-title').textContent = data.titulo || '';

    // Palabras y metadata
    const palabras = data.detalle ? data.detalle.trim().split(/\s+/).length : 0;
    document.getElementById('detail-meta').textContent =
      `Texto completo · ~${palabras.toLocaleString()} palabras`;

    // Cuerpo con resaltado de términos
    const body = document.getElementById('detail-body');
    if (ultimaBusqueda?.texto) {
      body.innerHTML = highlight(data.detalle || '(Sin texto disponible)', ultimaBusqueda.texto);
    } else {
      body.textContent = data.detalle || '(Sin texto disponible)';
    }

    const panel = document.getElementById('detail-panel');
    panel.classList.add('active');
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch (e) {
    setStatus('Error al cargar detalle: ' + e.message, 'error');
  }
}

// ─── Copiar / Exportar ─────────────────────────────────────────────────────

function copiarTexto() {
  const titulo = document.getElementById('detail-title').textContent;
  const cuerpo = document.getElementById('detail-body').innerText;
  navigator.clipboard.writeText(`${titulo}\n\n${cuerpo}`)
    .then(() => {
      const btn  = document.querySelector('.btn-icon[onclick="copiarTexto()"]');
      const orig = btn.innerHTML;
      btn.innerHTML = '&#10003; Copiado';
      setTimeout(() => btn.innerHTML = orig, 2000);
    })
    .catch(() => alert('No se pudo copiar. Seleccioná el texto manualmente.'));
}

function exportarTxt() {
  const titulo = document.getElementById('detail-title').textContent.trim();
  const cuerpo = document.getElementById('detail-body').innerText.trim();
  if (!titulo && !cuerpo) return;

  const contenido = `${titulo}\n${'='.repeat(titulo.length)}\n\n${cuerpo}`;
  const blob      = new Blob([contenido], { type: 'text/plain;charset=utf-8' });
  const url       = URL.createObjectURL(blob);
  const a         = document.createElement('a');
  const match     = titulo.match(/\d+\/\d+/);
  const nombre    = match ? `sentencia_${match[0].replace('/', '-')}.txt` : 'sentencia.txt';
  a.href          = url;
  a.download      = nombre;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

function cerrarDetalle() {
  document.getElementById('detail-panel').classList.remove('active');
  document.getElementById('detail-body').innerHTML = '';
  document.getElementById('detail-title').textContent = '';
  document.getElementById('detail-meta').textContent  = '';
}

// ─── Inicialización ────────────────────────────────────────────────────────

// Cargar búsqueda desde URL si existe (enlace compartido)
window.addEventListener('DOMContentLoaded', loadFromParams);
</script>
