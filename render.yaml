services:
  - type: web
    name: bjn-buscador
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: PORT
        value: 10000
      # Ruta fija del navegador Chromium dentro del contenedor Docker.
      # Evita que Playwright lo busque en rutas temporales y garantiza
      # que la capa de Docker se cachee correctamente entre deploys.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/playwright-browsers
    plan: free

  - type: web
    name: bjn-jurisprudencia-mcp
    runtime: python
    buildCommand: pip install -r mcp/requirements.txt
    startCommand: python mcp/server.py
    plan: free
    envVars:
      - key: PORT
        value: 10000
